<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單查詢系統</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <button id="menu-toggle" class="icon-btn"><i class="fas fa-bars"></i></button>
        <div class="logo">系統標題</div>
    </header>

    <nav id="side-menu" class="side-menu">
        <div class="menu-header">
            <h3>功能選單</h3>
            <button id="menu-close" class="close-btn">&times;</button>
        </div>
        <ul>
            <li><a href="#"><i class="fas fa-home"></i> 首頁</a></li>
            <li><a href="#"><i class="fas fa-search"></i> 訂單查詢</a></li>
            <li><a href="#"><i class="fas fa-bullhorn"></i> 最新公告</a></li>
            <li><a href="#"><i class="fas fa-user-shield"></i> 管理登入</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="hero-carousel">
            <div class="carousel-container">
                <div class="carousel-slide">
                    <h2>左右輪播圖片預留區</h2>
                    <p>後續可放置活動 Banner 或形象圖</p>
                </div>
            </div>
        </section>

        <section class="search-section">
            <div class="search-card">
                <i class="fas fa-magnifying-glass search-icon"></i>
                <input type="text" placeholder="請輸入訂單編號或關鍵字..." id="order-search">
                <button type="button" class="btn-primary">查詢</button>
            </div>
        </section>

        <section class="notice-board">
            <div class="section-title">
                <i class="fas fa-clipboard-list"></i> 重要佈告欄
            </div>
            <div class="notice-list">
                <div class="notice-item">
                    <span class="date">2026-04-24</span>
                    <p>系統維護公告：本週日凌晨將進行資料庫優化作業。</p>
                </div>
                <div class="notice-item">
                    <span class="date">2026-04-20</span>
                    <p>新功能上線：現在支援透過 LINE Notify 接收訂單異動通知。</p>
                </div>
            </div>
        </section>
    </main>

    <div id="overlay" class="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
