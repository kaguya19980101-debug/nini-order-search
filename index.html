<!DOCTYPE html>
<html lang="zh-TW">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妮妮訂單查詢</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-nav">
        <button id="menu-toggle" class="icon-btn"><i class="fas fa-bars"></i></button>
        <div class="logo">nini order search</div>
    </header>

    <!-- 側邊選單優化版 -->
    <nav id="side-menu" class="side-menu">
        <div class="menu-header">
            <h2>MENU</h2>
            <!-- 💡 漂亮圓形關閉鈕 -->
            <button id="menu-close" class="close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <ul class="menu-list">
            <li><a href="index.html"><i class="fas fa-home"></i> 首頁</a></li>
            <li><a href="query.html"><i class="fas fa-search"></i> 訂單查詢</a></li>
           <li><a href="shop.html"><i class="fas fa-shopping-bag"></i> 現貨賣場</a></li>
            <li><a href="about.html" class="active"><i class="fas fa-info-circle"></i> 關於我們</a></li>
        </ul>
        
        <!-- 💡 底部聯絡資訊：讓選單不那麼空 -->
        <div class="menu-footer">
            <p>有問題嗎？找妮妮</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-line"></i></a>
                <a href="#"><i class="fab fa-facebook-messenger"></i></a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="hero-carousel">
            <div class="swiper">
                <div class="swiper-wrapper">
                    <!-- 類型 1：能點擊跳轉的圖片 -->
                    <div class="swiper-slide">
                        <a href="https://line.me/R/ti/p/@yourid" target="_blank">
                            <img src="images/banner/banner_01.jpg" alt="加入LINE群組">
                        </a>
                    </div>
                    <!-- 類型 2：純畫面圖片 -->
                    <div class="swiper-slide">
                        <img src="images/banner/banner_02.jpg" alt="新品預告">
                    </div>
                    <!-- 類型 2：純畫面圖片 -->
                    <div class="swiper-slide">
                        <img src="images/banner/banner_03.jpg" alt="新品預告">
                    </div>
                    <!-- 類型 2：純畫面圖片 -->
                    <div class="swiper-slide">
                        <img src="images/banner/banner_04.jpg" alt="新品預告">
                    </div>
                </div>
                <!-- 如果需要分頁圓點 -->
                <div class="swiper-pagination"></div>
            </div>
        </section>

        <section class="search-section">
            <div class="search-container">
                <h2 class="search-title">訂單查詢</h2>
                <div class="search-form-card">
                    <div class="input-group">
                        <label for="community-name"><i class="fas fa-users"></i> 社群名稱</label>
                        <input type="text" id="community-name" placeholder="請輸入社群名稱">
                    </div>
                    <div class="input-group">
                        <label for="phone-number"><i class="fas fa-mobile-alt"></i> 手機號碼</label>
                        <input type="tel" id="phone-number" placeholder="請輸入手機號碼">
                    </div>
                    <button type="button" id="submit-query" class="btn-primary">
                        <i class="fas fa-magic"></i> 開始查詢
                    </button>
                </div>
            </div>
        </section>

        <section id="result-section" class="result-section" style="display: none;">
            <div class="result-card">
                <div id="result-content"></div>
            </div>
        </section>

            <div class="notice-list">
                <section class="notice-board">
                    <div class="section-title"><span>✦</span> 重要佈告欄</div>
                    <div id="notice-list" class="notice-list">
                        <!-- 這裡由 JS 動態生成 -->
                    </div>
                    <!-- 分頁按鈕 -->
                    <div id="pagination" class="pagination-container"></div>
                </section>
            </div>
    </main>
    <!-- 公告彈窗容器 -->
    <div id="notice-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">公告標題</h3>
            </div>
            <div class="modal-body">
                <p id="modal-date" class="modal-date"></p>
                <div id="modal-text" class="modal-text">公告內容</div>
            </div>
            <div class="modal-footer">
                <button id="modal-confirm" class="btn-primary">我知道了</button>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
