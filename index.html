<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妮妮訂單查詢</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <button id="menu-toggle" class="icon-btn"><i class="fas fa-bars"></i></button>
        <div class="logo">nini order search</div>
    </header>

    <nav id="side-menu" class="side-menu">
        <div class="menu-header">
            <h3>Menu</h3>
            <button id="menu-close" class="close-btn">&times;</button>
        </div>
        <ul>
            <li><a href="#"><i class="fas fa-star"></i> 首頁</a></li>
            <li><a href="#"><i class="fas fa-heart"></i> 訂單查詢</a></li>
            <li><a href="#"><i class="fas fa-comment-dots"></i> 最新公告</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="hero-carousel">
            <div class="carousel-placeholder">
                <i class="far fa-images"></i>
                <p>左右輪播圖片預留區</p>
            </div>
        </section>

        <section class="search-section">
            <div class="search-card">
                <input type="text" placeholder="輸入編號找找看..." id="order-search">
                <button type="button" class="btn-primary">GO!</button>
            </div>
        </section>

        <section class="notice-board">
            <div class="section-title">
                <span>✦</span> 重要佈告欄
            </div>
            <div class="notice-list">
                <div class="notice-item">
                    <div class="notice-tag">NEW</div>
                    <div class="notice-body">
                        <span class="date">2026.04.24</span>
                        <p>系統維護公告：本週日凌晨會休息一下喔！</p>
                    </div>
                </div>
                <div class="notice-item">
                    <div class="notice-tag">INFO</div>
                    <div class="notice-body">
                        <span class="date">2026.04.20</span>
                        <p>現在支援透過 LINE Notify 接收通知囉～</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="overlay" class="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
