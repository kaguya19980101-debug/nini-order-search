<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單查詢 - 妮妮小舖</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <button id="menu-toggle" class="icon-btn"><i class="fas fa-bars"></i></button>
        <div class="logo">nini order search</div>
    </header>

    <nav id="side-menu" class="side-menu">
        <div class="menu-header">
            <h3>Menu</h3>
            <button id="menu-close" class="close-btn">&times;</button>
        </div>
        <ul>
            <li><a href="index.html"><i class="fas fa-star"></i> 首頁</a></li>
            <li><a href="query.html"><i class="fas fa-heart"></i> 訂單查詢</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="search-section">
            <div class="search-container">
                <h2 class="search-title">訂單查詢</h2>
                <div class="search-form-card">
                    <div class="input-group">
                        <label for="community-name"><i class="fas fa-users"></i> 社群名稱</label>
                        <input type="text" id="community-name" placeholder="請輸入社群名稱">
                    </div>
                    <div class="input-group">
                        <label for="phone-number"><i class="fas fa-mobile-alt"></i> 手機號碼</label>
                        <input type="tel" id="phone-number" placeholder="請輸入手機號碼">
                    </div>
                        <button type="button" id="submit-query" class="btn-primary">
                            <i class="fas fa-magic"></i> 開始查詢
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="result-section" class="result-section" style="display: none;">
            <div class="section-title">✦ 我的訂單紀錄</div>
            <div id="cards-container" class="cards-container">
                </div>
        </section>
    </main>

    <div id="overlay" class="overlay"></div>
    <script src="script.js"></script>
</body>
</html>
